name: 探測行情 API 欄位（一次性）

# 手動觸發：抓一個市場「不帶作物名」的原始回應，dump 欄位/樣本到 prices_probe.json，
# 用來決定「逐市場抓全部＋分類」的做法（看 API 有沒有種類欄位）。與行情排程互不阻塞。
on:
  workflow_dispatch:
    inputs:
      market:
        description: 市場短名（如 台北一 / 台中 / 西螺）
        required: true
        default: 台北一

permissions:
  contents: write

concurrency:
  group: probe

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r scripts/requirements.txt
      - name: 探測
        run: python3 scripts/fetch_prices.py --probe "${{ inputs.market }}"
      - name: 提交探測結果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices_probe.json
          git diff --staged --quiet || { git commit -m "chore: 行情 API 欄位探測 [skip ci]"; \
            for i in 1 2 3 4 5; do git push origin HEAD:main && break; git fetch origin main; git rebase origin/main || git rebase --abort; sleep $((i*3)); done; }
