<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring" x1="0.15" y1="0.9" x2="0.85" y2="0.1">
      <stop offset="0" stop-color="#11736a"/><stop offset="0.55" stop-color="#188a7d"/><stop offset="1" stop-color="#3db8a4"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#66d6c0" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#8fe4d3" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#dcf6f0" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#4a9e39"/><stop offset="1" stop-color="#8fd257"/>
    </linearGradient>
    <linearGradient id="basket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7b877"/><stop offset="1" stop-color="#c8934a"/>
    </linearGradient>
    <clipPath id="scope"><circle cx="256" cy="256" r="183"/></clipPath>
  </defs>

  <rect x="0" y="0" width="512" height="512" fill="#ffffff"/>

  <g clip-path="url(#scope)">
    <!-- radar sweep fan, upper-right -->
    <path d="M256 256 L223 71 A188 188 0 0 1 433 320 Z" fill="url(#sweep)"/>
    <!-- range arcs, upper-left -->
    <g stroke="#b3c1bf" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.9">
      <path d="M121 220 A140 140 0 0 1 232 118"/>
      <path d="M162 222 A100 100 0 0 1 230 159"/>
    </g>
    <!-- field: split dark-left / light-right (teal) -->
    <path d="M60 272 Q158 288 256 292 L256 460 L60 460 Z" fill="#166b5f"/>
    <path d="M256 292 Q356 288 452 272 L452 460 L256 460 Z" fill="#4fc2ab"/>
    <g stroke="#f0faf7" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.96">
      <path d="M256 292 L86 460"/><path d="M256 292 L150 460"/><path d="M256 292 L210 460"/>
      <path d="M256 292 L256 460"/><path d="M256 292 L302 460"/><path d="M256 292 L362 460"/><path d="M256 292 L426 460"/>
      <path d="M112 356 Q256 330 400 356"/><path d="M88 408 Q256 372 424 408"/>
    </g>
  </g>

  <!-- radar ring + cardinal crosshair notches -->
  <circle cx="256" cy="256" r="183" fill="none" stroke="url(#ring)" stroke-width="21"/>
  <g stroke="url(#ring)" stroke-width="21" stroke-linecap="butt">
    <line x1="256" y1="62" x2="256" y2="96"/>
    <line x1="62" y1="256" x2="96" y2="256"/>
    <line x1="416" y1="256" x2="450" y2="256"/>
  </g>

  <!-- ===== produce poking out of the basket (leaf motif, ties to farmer sibling) ===== -->
  <path d="M256 250 C238 214 210 196 184 200 C188 236 214 258 253 256 Z" fill="url(#leaf)" stroke="#2f6b28" stroke-width="3.5"/>
  <path d="M256 250 C270 216 300 200 330 208 C320 244 292 260 258 256 Z" fill="url(#leaf)" stroke="#2f6b28" stroke-width="3.5"/>
  <path d="M256 256 C256 250 256 246 256 242" stroke="#2f7d32" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- ===== market basket ===== -->
  <!-- body -->
  <path d="M198 262 L314 262 L300 312 L212 312 Z" fill="url(#basket)" stroke="#8a5f26" stroke-width="4" stroke-linejoin="round"/>
  <!-- weave: verticals + a band -->
  <g stroke="#a9762f" stroke-width="4" fill="none" opacity="0.85" stroke-linecap="round">
    <path d="M226 264 L232 310"/><path d="M256 264 L256 310"/><path d="M286 264 L280 310"/>
    <path d="M203 286 L309 286"/>
  </g>
  <!-- rim -->
  <ellipse cx="256" cy="262" rx="60" ry="12" fill="#b9832f" stroke="#8a5f26" stroke-width="4"/>
  <ellipse cx="256" cy="260" rx="47" ry="7" fill="#7a5a2b" opacity="0.55"/>
</svg>
